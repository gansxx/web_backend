#修改该文件中的依赖不再重新下载，浪费时间
services:
  # Main API Service
  api:
    # Use .env.docker for container environment variables
    # This allows container to access host services via host.docker.internal
    env_file:
      - .env.local.docker
    build: .
    image: gansxx/web-backend-api:latest
    container_name: web-backend-api-local
    restart: unless-stopped
    ports:
      - "8001:8001"
    # Allow container to access host machine services
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Service configuration (override .env.docker if needed)
      - ENVIRONMENT=production
      - USE_GUNICORN=true
      - BIND_ADDRESS=0.0.0.0:8001
      - GUNICORN_WORKERS=4
      # Note: All other variables are loaded from .env.docker
      # Do not add SUPABASE_URL, ANON_KEY, etc. here to avoid overriding .env.docker
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  backend-network:
    driver: bridge

