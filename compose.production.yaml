# Docker Compose configuration for production deployment
# Uses pre-built images instead of building from source
# Main API Service (port 8001): Authentication, user management, payments

services:
  # Main API Service
  api:
    # Use .env.docker for container environment variables
    # This allows container to access host services via host.docker.internal
    env_file:
      - .env.docker
    # Replace with your actual image name and tag
    # Examples:
    # - Docker Hub: yourusername/web-backend-api:latest
    # - Private Registry: registry.example.com/web-backend-api:v1.0.0
    # - GitHub Container Registry: ghcr.io/yourusername/web-backend-api:latest
    image: web-backend-api:latest

    container_name: web-backend-api
    restart: unless-stopped

    ports:
      - "8001:8001"

    # Allow container to access host machine services
    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      # Service configuration (override .env.docker if needed)
      - ENVIRONMENT=production
      - USE_GUNICORN=true
      - BIND_ADDRESS=0.0.0.0:8001
      - GUNICORN_WORKERS=4
      # Note: All other variables are loaded from .env.docker
      # Do not add SUPABASE_URL, ANON_KEY, etc. here to avoid overriding .env.docker

    networks:
      - backend-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  backend-network:
    driver: bridge
